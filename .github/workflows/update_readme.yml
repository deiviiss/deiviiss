# This is a basic workflow to help you get started with Actions

name: Update Readme

# Controls when the workflow will run
on:
  schedule:
    - cron: "* */12 * * *"
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    name: Update Profile README

    steps:
      
- uses: actions/checkout@v3


- uses: jamesgeorge007/github-activity-readme@master

env:

GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

with:

# LIMIT_TO: 5 # Opcional: Cuántos eventos mostrar (por defecto 5)

# MAX_LINES: 10 # Opcional

COMMIT_NAME: 'github-actions[bot]'

COMMIT_EMAIL: 'github-actions[bot]@users.noreply.github.com'

debes usar las siguientes etiquetas en el contenido de tu README.md (me refiero al documento que muestra tu perfil):

### Mi Actividad reciente en GitHub

<!--START_SECTION:activity-->

<!--END_SECTION:activity-->
